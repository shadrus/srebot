{{- if .Values.redis.enabled -}}
{{- if empty .Values.redis.url -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-health-bot.fullname" . }}-redis
  labels:
    {{- include "ai-health-bot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "ai-health-bot.name" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "ai-health-bot.name" . }}-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-health-bot.fullname" . }}-redis
  labels:
    {{- include "ai-health-bot.labels" . | nindent 4 }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: {{ include "ai-health-bot.name" . }}-redis
{{- end -}}
{{- end -}}
