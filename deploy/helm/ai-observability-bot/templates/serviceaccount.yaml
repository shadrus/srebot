apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-observability-bot.fullname" . }}
  labels:
    {{- include "ai-observability-bot.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.create }}
