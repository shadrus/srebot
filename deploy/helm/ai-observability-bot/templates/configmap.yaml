apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-observability-bot.fullname" . }}-config
  labels:
    {{- include "ai-observability-bot.labels" . | nindent 4 }}
data:
  config.yml: |
{{ .Values.config | toYaml | nindent 4 }}
    
    # Optional override: Use internal redis if enabled and url is empty
    {{- if and .Values.redis.enabled (empty .Values.redis.url) }}
    redis_url: "redis://{{ include "ai-observability-bot.fullname" . }}-redis:6379/0"
    {{- else if .Values.redis.url }}
    redis_url: {{ .Values.redis.url | quote }}
    {{- end }}
